font_family      JetBrains Mono
font_size        13.0

# macOS-like keybindings
# Ctrl+C remains SIGINT; Command (Super) handles copy/paste/tabs

# Clear all default shortcuts first to avoid conflicts
clear_all_shortcuts yes

# Copy / Paste
map super+c copy_to_clipboard
map super+v paste_from_clipboard

# Tabs
map super+t new_tab
map super+w close_tab
map super+1 goto_tab 1
map super+2 goto_tab 2
map super+3 goto_tab 3
map super+4 goto_tab 4
map super+5 goto_tab 5
map super+6 goto_tab 6
map super+7 goto_tab 7
map super+8 goto_tab 8
map super+9 goto_tab 9
map super+] next_tab
map super+[ previous_tab

# Window
map super+n new_os_window
map super+enter new_window

# Font size
map super+equal change_font_size all +1.0
map super+minus change_font_size all -1.0
map super+0     change_font_size all 0

# Search
map super+f show_scrollback

# Scrollback
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down

# Restore common kitty defaults that clear_all_shortcuts removed
map ctrl+shift+u    kitten unicode_input
map ctrl+shift+f2   edit_config_file
map ctrl+shift+f5   load_config_file
